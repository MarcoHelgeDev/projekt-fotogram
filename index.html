<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <script src="./scripts/script.js" defer></script>
  </head>
  <body onload="renderImgGallery()">
    <header class="site-header">
      <div class="container">
        <div class="site-header-wrapper">
          <img src="./assets/img/Capa_1.svg" alt="fotogram-lg" />
        </div>
      </div>
    </header>
    <dialog class="js-dialog-gallery dialog-gallery">
      <div class="dialog-gallery-content">
        <header class="dialog-header">
          <h2>Mein Dialog</h2>
          <button class="js-close-icon dialog-x-btn" onclick="closeDialog()"></button>
        </header>
        <section class="dialog-section">
          <img src="./assets/img/dog.jpg" />
        </section>
        <footer class="dialog-footer">
          <div class="dialog-footer-btn-wrapper">
            <button class="dialog-btn dialog-btn-left" onclick="closeDialog()"></button>
            <span>1/12</span>
            <button class="dialog-btn dialog-btn-right" onclick="closeDialog()"></button>
          </div>
        </footer>
      </div>
    </dialog>
    <main class="container">
      <section>
        <h1>Your personal photo album</h1>
        <div class="section-wrapper">
          <div class="js-gallery-wrapper gallery-wrapper">
          </div>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div class="footer-wrapper">
          <img src="./assets/img/da-lg.svg" alt="developer-akademie-logo" />
          <p>© 2023 Developer Akademie GmbH</p>
        </div>
      </div>
    </footer>
  </body>
</html>
