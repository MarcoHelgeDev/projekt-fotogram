<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.svg" />
    <script src="./scripts/script.js" defer></script>
  </head>
  <body onload="renderImgGallery()">
    <header class="site-header">
      <div class="container">
        <div class="site-header-wrapper">
          <img src="./assets/img/Capa_1.svg" alt="fotogram-lg" />
        </div>
      </div>
    </header>

    <dialog
      aria-labelledby="picture-name"
      aria-describedby="a-dialog-with-picture-and-title"
      id="gallery-dialog"
      class="js-dialog-gallery dialog-gallery"
    >
      <div class="dialog-gallery-content">
        <header class="js-dialog-header dialog-header"></header>
        <section class="js-dialog-section dialog-section"></section>
        <footer class="dialog-footer">
          <div class="js-dialog-footer dialog-footer-btn-wrapper"></div>
        </footer>
      </div>
    </dialog>

    <main class="container">
      <section>
        <h1 class="js-headline" tabindex="-1">Your personal photo album</h1>
        <div class="section-wrapper">
          <div class="js-gallery-wrapper gallery-wrapper"></div>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div class="footer-wrapper">
          <img src="./assets/img/da-lg.svg" alt="developer-akademie-logo" />
          <p>© 2026 Developer Akademie GmbH</p>
        </div>
      </div>
    </footer>
  </body>
</html>
